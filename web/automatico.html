<!DOCTYPE html>
<html>
<head>
    <title>SignalIQ - Análisis Automático</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; }
        input, button { padding: 10px; margin: 5px; }
        button { background: #28a745; color: white; cursor: pointer; border: none; border-radius: 5px; }
        .result { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .buy { color: green; font-weight: bold; }
        .sell { color: red; font-weight: bold; }
        pre { white-space: pre-wrap; background: white; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 SignalIQ - Análisis Automático</h1>
        <p>Datos reales de Yahoo Finance + Análisis Gemini AI</p>
        
        <input type="text" id="ticker" placeholder="Ej: NVDA, AAPL, GOOGL" value="NVDA">
        <button onclick="analyze()">Analizar con Datos Reales</button>
        
        <div id="result" class="result"></div>
    </div>
    
    <script>
        async function analyze() {
            const ticker = document.getElementById('ticker').value.toUpperCase();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<p>📊 Obteniendo datos reales de Yahoo Finance...<br>🤖 Analizando con Gemini...</p>';
            
            try {
                const response = await fetch(`http://localhost:5000/analyze/${ticker}`);
                const data = await response.json();
                
                if (data.success) {
                    const a = data.analysis;
                    resultDiv.innerHTML = `
                        <h2>${a.ticker}</h2>
                        <p><strong>NDI Calculado:</strong> ${a.ndi_calculated}</p>
                        <p><strong>Noticias Recientes:</strong> ${a.news_used}</p>
                        <p><strong>Recomendación:</strong> <span class="${a.recommendation.toLowerCase()}">${a.recommendation}</span></p>
                        <p><strong>Confianza:</strong> ${a.confidence * 100}%</p>
                        <hr>
                        <h3>Análisis Gemini:</h3>
                        <pre>${a.full_analysis}</pre>
                        <small>Fuente: ${a.data_source} | ${a.timestamp}</small>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
