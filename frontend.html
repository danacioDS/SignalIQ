<!DOCTYPE html>
<html>
<head>
    <title>SignalIQ - Análisis con Gemini REAL</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 50px auto; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        input, button { padding: 12px; margin: 8px 5px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .result { background: #f8f9fa; padding: 25px; border-radius: 10px; margin-top: 25px; max-height: 600px; overflow-y: auto; }
        .buy { color: #28a745; font-weight: bold; font-size: 1.3em; }
        .sell { color: #dc3545; font-weight: bold; font-size: 1.3em; }
        .hold { color: #ffc107; font-weight: bold; font-size: 1.3em; }
        pre { white-space: pre-wrap; word-wrap: break-word; background: white; padding: 20px; border-radius: 8px; overflow-x: auto; line-height: 1.6; font-family: monospace; font-size: 14px; }
        h1 { color: #333; margin-bottom: 10px; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 15px; }
        .online { background: #28a745; color: white; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-left: 10px; }
        .badge-real { background: #28a745; color: white; }
        .input-group { margin: 20px 0; }
        label { display: inline-block; width: 100px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"] { width: 300px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .gemini-badge { background: #4285f4; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 SignalIQ Financial Analysis <span class="gemini-badge">Gemini AI</span></h1>
        <p>Powered by <strong>Google Gemini AI Real</strong> 
           <span id="status" class="status online">🟢 Conectado</span>
        </p>
        
        <div class="input-group">
            <label>Ticker:</label>
            <input type="text" id="ticker" placeholder="NVDA, AAPL, MSFT" value="MSFT">
        </div>
        
        <div class="input-group">
            <label>NDI Score:</label>
            <input type="number" id="ndi" step="0.01" min="0" max="1" value="0.85">
        </div>
        
        <div class="input-group">
            <label>News:</label>
            <input type="text" id="news" size="60" value="NVIDIA announces breakthrough AI chips">
        </div>
        
        <button onclick="analyze()">🚀 Analizar con Gemini REAL</button>
        
        <div id="result" class="result"></div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000';
        
        async function analyze() {
            const ticker = document.getElementById('ticker').value.toUpperCase();
            const ndi = parseFloat(document.getElementById('ndi').value);
            const news = document.getElementById('news').value;
            const btn = event.target;
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p><div class="spinner"></div> 🤖 Generando análisis con Gemini AI...<br>⏱️ Esto toma 3-5 segundos...</p>';
            btn.disabled = true;
            btn.textContent = '⏳ Analizando...';
            
            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ticker, ndi, news})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const a = data.analysis;
                    const recClass = a.recommendation.toLowerCase();
                    const timestamp = a.timestamp || new Date().toLocaleString();
                    
                    resultDiv.innerHTML = `
                        <h2>📈 Análisis para ${a.ticker} <span class="badge badge-real">✅ GEMINI REAL</span></h2>
                        <p><strong>💡 Recomendación:</strong> <span class="${recClass}">${a.recommendation}</span></p>
                        <p><strong>🎯 Confianza:</strong> ${(a.confidence * 100).toFixed(0)}%</p>
                        <p><strong>📊 Fuerza de Señal:</strong> ${a.signal_strength}</p>
                        <p><strong>🔑 Key usada:</strong> ${a.key_used || 'N/A'} | <strong>Proyecto:</strong> ${a.project || 'N/A'}</p>
                        <hr>
                        <h3>📝 Análisis Completo:</h3>
                        <pre>${a.full_analysis}</pre>
                        <hr>
                        <small>🕐 ${timestamp}</small>
                    `;
                } else {
                    resultDiv.innerHTML = `<p>❌ Error: ${data.error}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p>❌ Error de conexión: ${error.message}<br><br>Asegúrate que la API está corriendo:<br><code>python api_final_2projects.py</code></p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Analizar con Gemini REAL';
            }
        }
    </script>
</body>
</html>
