version: '3.8'

services:
  signaliq-api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY_1=GEMINI_API_KEY_REDACTED
      - GEMINI_API_KEY_2=GEMINI_API_KEY_REDACTED
      - GEMINI_API_KEY_3=GEMINI_API_KEY_REDACTED
      - GROQ_API_KEY=tu_groq_key_aqui
    restart: unless-stopped
